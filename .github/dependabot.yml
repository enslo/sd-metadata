version: 2
updates:
  # All npm dependencies (pnpm workspace: root + demo)
  - package-ecosystem: "npm"
    directory: "/"
    schedule:
      interval: "monthly"
    commit-message:
      prefix: "chore"
      prefix-development: "chore"
    # Align with pnpm 11 minimumReleaseAge (1 day) and add safety margin
    cooldown:
      default-days: 2
      semver-major-days: 7
    groups:
      demo-mantine:
        patterns: ["@mantine/*"]
      # pnpm catalog entries (shared dev tools across all packages)
      catalog:
        patterns: ["@biomejs/biome", "@types/node", "tsdown", "typescript", "vite", "vitest"]
      demo-dependencies:
        dependency-type: "production"
        update-types: ["minor", "patch"]
        exclude-patterns: ["@mantine/*", "@biomejs/biome", "@types/node", "tsdown", "typescript", "vite", "vitest"]
      dev-dependencies:
        dependency-type: "development"
        update-types: ["minor", "patch"]

  # GitHub Actions
  - package-ecosystem: "github-actions"
    directory: "/"
    schedule:
      interval: "monthly"
    commit-message:
      prefix: "chore"
    cooldown:
      default-days: 2
    groups:
      actions:
        patterns: ["*"]
